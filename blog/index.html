<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Field Notes — Predictive Pest Management | PredictivePest</title>
<meta name="description" content="Articles on the biology, science, and operational principles of predictive pest management. Soil temperature, biological thresholds, push windows, and the science behind biology-driven pest control.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://predictivepest.com/blog">
<meta property="og:type" content="website">
<meta property="og:url" content="https://predictivepest.com/blog">
<meta property="og:title" content="Field Notes — Predictive Pest Management">
<meta property="og:description" content="Articles on the biology, science, and operational principles of predictive pest management.">
<meta property="og:site_name" content="PredictivePest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--off:#f8f7f5;--paper:#f2f0ec;--rule:#dedad3;--mid:#b0aba1;--muted:#7a7670;--body:#2e2c28;--ink:#141210;--moss:#2d4a35;--sage:#4e7a58;--sage-lt:#a8c4ac;--amber:#b5622a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--body);font-family:'IBM Plex Sans',sans-serif;font-weight:300;line-height:1.7;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 56px;height:64px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--rule)}
.logo{font-family:'IBM Plex Sans',sans-serif;font-weight:400;font-size:15px;letter-spacing:.08em;color:var(--ink);text-decoration:none}.logo span{color:var(--sage)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.06em;transition:color .2s}.nav-links a:hover,.nav-links a.active{color:var(--ink)}
.wrap{max-width:760px;margin:0 auto;padding:112px 40px 80px}
.section-index{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.section-n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.1em}
.section-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
h1.page-heading{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.15;color:var(--ink);margin-bottom:56px}
h1.page-heading em{font-style:italic;color:var(--sage)}
.posts-list{display:flex;flex-direction:column}
.post-row{display:grid;grid-template-columns:88px 1fr;gap:28px;padding:32px 0;border-top:1px solid var(--rule);text-decoration:none;color:inherit;transition:opacity .2s}
.post-row:hover{opacity:.75}
.post-row:last-child{border-bottom:1px solid var(--rule)}
.post-meta{display:flex;flex-direction:column;gap:6px;padding-top:2px}
.post-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mid);letter-spacing:.06em;line-height:1.5}
.post-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sage);letter-spacing:.06em}
.post-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;line-height:1.25;color:var(--ink);margin-bottom:10px}
.post-excerpt{font-size:13px;color:var(--muted);line-height:1.65;font-weight:300;margin-bottom:10px}
.post-read{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sage);letter-spacing:.06em}
.empty{padding:48px 0;text-align:center;color:var(--mid);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em}
.loading{padding:48px 0;text-align:center;color:var(--mid);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em}
footer{border-top:1px solid var(--rule);padding:28px 56px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:40px}
.f-brand{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.05em}
.f-note{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.04em}
.f-link{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.06em;transition:color .2s}.f-link:hover{color:var(--sage)}
@media(max-width:768px){nav{padding:0 24px}.nav-links{display:none}.wrap{padding:96px 24px 60px}h1.page-heading{font-size:32px}.post-row{grid-template-columns:1fr}.post-meta{flex-direction:row;gap:16px}footer{padding:24px;flex-direction:column}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">PREDICTIVE<span>PEST</span>.COM</a>
  <ul class="nav-links">
    <li><a href="/#science">The Science</a></li>
    <li><a href="/#model">The Model</a></li>
    <li><a href="/#thresholds">Thresholds</a></li>
    <li><a href="/#principles">Principles</a></li>
    <li><a href="/blog" class="active">Field Notes</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="section-index">
    <div class="section-n">05</div>
    <div class="section-tag">Field Notes</div>
  </div>
  <h1 class="page-heading">What biology says<br>about pest timing.<br><em>Updated as it happens.</em></h1>

  <div class="posts-list" id="posts">
    <div class="loading">Loading articles...</div>
  </div>
</div>

<footer>
  <span class="f-brand">PredictivePest.com</span>
  <span class="f-note">A category resource maintained by ChemCal Pro LLC</span>
  <a href="https://zoneiq.co" class="f-link" target="_blank" rel="noopener">zoneiq.co &#8599;</a>
</footer>

<script>
(async () => {
  const container = document.getElementById('posts');
  try {
    const r = await fetch('/posts/posts.json?v=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const posts = await r.json();
    if (!posts.length) {
      container.innerHTML = '<div class="empty">No articles published yet.</div>';
      return;
    }
    container.innerHTML = posts.map((p, i) => {
      const [month, year] = p.date.split(' ');
      return `<a href="/blog/${p.slug}" class="post-row">
  <div class="post-meta">
    <div class="post-date">${(month || '').toUpperCase().slice(0,3)}<br>${year || ''}</div>
    <div class="post-tag">${p.tag || ''}</div>
  </div>
  <div class="post-body">
    <div class="post-title">${p.title}</div>
    <div class="post-excerpt">${p.excerpt || ''}</div>
    <div class="post-read">Read article &#8594;</div>
  </div>
</a>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<div class="empty">Could not load articles.</div>';
  }
})();
</script>
</body>
</html>
