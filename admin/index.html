<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Field Notes Admin — PredictivePest</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--off:#f8f7f5;--paper:#f2f0ec;--rule:#dedad3;--mid:#b0aba1;--muted:#7a7670;--body:#2e2c28;--ink:#141210;--moss:#2d4a35;--sage:#4e7a58;--sage-lt:#a8c4ac;--amber:#b5622a;--red:#c0392b;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);color:var(--body);font-family:'IBM Plex Sans',sans-serif;font-weight:300;line-height:1.6;min-height:100vh}
/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--white);border:1px solid var(--rule);border-radius:6px;padding:48px;width:100%;max-width:380px}
.login-logo{font-family:'IBM Plex Sans',sans-serif;font-weight:400;font-size:14px;letter-spacing:.1em;color:var(--ink);margin-bottom:6px}.login-logo span{color:var(--sage)}
.login-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.06em;margin-bottom:36px}
.login-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:8px}
.login-input{width:100%;border:1px solid var(--rule);border-radius:4px;padding:10px 14px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);background:var(--white);margin-bottom:20px;outline:none;transition:border-color .2s}.login-input:focus{border-color:var(--sage)}
.login-btn{width:100%;background:var(--moss);color:var(--off);border:none;border-radius:4px;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;cursor:pointer;transition:opacity .2s}.login-btn:hover{opacity:.85}
.login-err{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);margin-top:12px;display:none}
/* ── ADMIN SHELL ── */
#admin-screen{display:none}
.admin-nav{background:var(--white);border-bottom:1px solid var(--rule);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-logo{font-family:'IBM Plex Sans',sans-serif;font-size:13px;letter-spacing:.08em;color:var(--ink)}.admin-logo span{color:var(--sage)}
.admin-nav-right{display:flex;align-items:center;gap:16px}
.tab-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em;background:none;border:none;cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}.tab-btn.active,.tab-btn:hover{color:var(--ink)}.tab-btn.active{border-bottom-color:var(--sage)}
.logout-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.06em;background:none;border:none;cursor:pointer;transition:color .2s}.logout-btn:hover{color:var(--ink)}
/* ── TABS ── */
.tab-panel{display:none;padding:32px}.tab-panel.active{display:block}
/* ── EDITOR TAB ── */
.editor-layout{max-width:800px;margin:0 auto}
.field-group{margin-bottom:20px}
.field-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:7px}
.field-input,.field-select,.field-textarea{width:100%;border:1px solid var(--rule);border-radius:4px;padding:10px 14px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);background:var(--white);outline:none;transition:border-color .2s}.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--sage)}
.field-textarea{resize:vertical;min-height:80px;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.slug-display{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px;padding:0 2px}
/* ── BLOCKS ── */
.blocks-area{margin-bottom:24px}
.block-card{background:var(--white);border:1px solid var(--rule);border-radius:6px;margin-bottom:10px;overflow:hidden}
.block-head{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--off);border-bottom:1px solid var(--rule)}
.block-type-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.block-actions{display:flex;gap:6px}
.block-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mid);background:var(--white);border:1px solid var(--rule);border-radius:3px;padding:2px 8px;cursor:pointer;transition:color .2s}.block-btn:hover{color:var(--ink)}
.block-btn.del:hover{color:var(--red)}
.block-body{padding:14px}
.block-input,.block-textarea{width:100%;border:1px solid var(--rule);border-radius:4px;padding:8px 12px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);background:var(--white);outline:none;transition:border-color .2s;line-height:1.6}.block-input:focus,.block-textarea:focus{border-color:var(--sage)}
.block-textarea{resize:vertical;min-height:100px}
.block-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.block-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;align-items:center}
.block-mini-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:4px}
/* table block */
.tbl-headers{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.tbl-header-input{flex:1;border:1px solid var(--rule);border-radius:4px;padding:6px 10px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--ink);background:var(--white);outline:none}.tbl-header-input:focus{border-color:var(--sage)}
.tbl-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.tbl-cell{flex:1;border:1px solid var(--rule);border-radius:4px;padding:6px 10px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);background:var(--white);outline:none}.tbl-cell:focus{border-color:var(--sage)}
.tbl-add-row{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sage);background:none;border:none;cursor:pointer;letter-spacing:.06em;padding:4px 0}
.tbl-del-row{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mid);background:none;border:none;cursor:pointer;flex-shrink:0}.tbl-del-row:hover{color:var(--red)}
/* image block */
.img-upload-zone{border:1px dashed var(--mid);border-radius:4px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s}.img-upload-zone:hover{border-color:var(--sage)}
.img-upload-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em}
.img-upload-label span{color:var(--sage)}
.img-preview{width:100%;max-height:200px;object-fit:cover;border-radius:4px;display:block;margin-bottom:10px}
.img-uploading{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sage);letter-spacing:.06em;margin-top:8px}
/* cta block */
.cta-preview-block{background:var(--moss);border-radius:4px;padding:16px 20px;color:var(--sage-lt);font-size:12px;line-height:1.5}
.cta-preview-block strong{display:block;color:var(--off);font-size:14px;margin-bottom:4px;font-weight:400}
/* divider block */
.divider-preview{border:none;border-top:2px dashed var(--rule);margin:8px 0}
/* pullquote block */
.pull-preview-block{border-left:2px solid var(--sage);padding-left:16px;color:var(--moss);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:18px;line-height:1.4}
/* ── PALETTE ── */
.palette-section{margin-top:8px}
.palette-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.palette{display:flex;flex-wrap:wrap;gap:8px}
.palette-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);background:var(--white);border:1px solid var(--rule);border-radius:4px;padding:6px 14px;cursor:pointer;letter-spacing:.04em;transition:color .2s,border-color .2s}.palette-btn:hover{color:var(--sage);border-color:var(--sage)}
/* ── ACTIONS ── */
.action-bar{display:flex;gap:12px;margin-top:24px;padding-top:24px;border-top:1px solid var(--rule);align-items:center}
.btn-publish{background:var(--moss);color:var(--off);border:none;border-radius:4px;padding:10px 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;cursor:pointer;transition:opacity .2s}.btn-publish:hover{opacity:.85}
.btn-draft{background:var(--white);color:var(--muted);border:1px solid var(--rule);border-radius:4px;padding:10px 20px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;cursor:pointer;transition:color .2s}.btn-draft:hover{color:var(--ink)}
.btn-preview{background:none;color:var(--sage);border:1px solid var(--sage-lt);border-radius:4px;padding:10px 20px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;cursor:pointer;transition:opacity .2s}.btn-preview:hover{opacity:.7}
.status-msg{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;margin-left:8px}
.status-ok{color:var(--sage)}.status-err{color:var(--red)}
/* ── POSTS TAB ── */
.posts-tab-layout{max-width:760px;margin:0 auto}
.posts-tab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.posts-tab-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--ink)}
.btn-new{background:var(--moss);color:var(--off);border:none;border-radius:4px;padding:8px 18px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;cursor:pointer}.btn-new:hover{opacity:.85}
.posts-loading{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.06em;padding:24px 0}
.post-item{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid var(--rule)}
.post-item:first-child{border-top:1px solid var(--rule)}
.post-item-title{font-size:14px;color:var(--ink);margin-bottom:4px;font-weight:400}
.post-item-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mid);letter-spacing:.06em}
.post-item-actions{display:flex;gap:8px}
.btn-view{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sage);text-decoration:none;letter-spacing:.04em}
.btn-del-post{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mid);background:none;border:none;cursor:pointer;letter-spacing:.04em}.btn-del-post:hover{color:var(--red)}
.posts-empty{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.06em;padding:24px 0}
@media(max-width:640px){.field-row{grid-template-columns:1fr}.block-row,.block-row-3{grid-template-columns:1fr}.action-bar{flex-wrap:wrap}}
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">PREDICTIVE<span>PEST</span>.COM</div>
    <div class="login-sub">Field Notes Admin</div>
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="login-pw" placeholder="Enter password" autocomplete="current-password"/>
    <button class="login-btn" id="login-btn">Sign in</button>
    <div class="login-err" id="login-err">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ── ADMIN ──────────────────────────────────────────────────────────── -->
<div id="admin-screen">
  <nav class="admin-nav">
    <div class="admin-logo">PREDICTIVE<span>PEST</span> — Admin</div>
    <div class="admin-nav-right">
      <button class="tab-btn active" data-tab="editor">New Article</button>
      <button class="tab-btn" data-tab="posts">Published</button>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </nav>

  <!-- EDITOR TAB -->
  <div id="tab-editor" class="tab-panel active">
    <div class="editor-layout">

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Article title</label>
          <input type="text" class="field-input" id="f-title" placeholder="e.g. Why soil temperature predicts termite swarms" oninput="onTitleChange()"/>
          <div class="slug-display" id="slug-display">predictivepest.com/blog/</div>
        </div>
        <div class="field-group">
          <label class="field-label">Category tag</label>
          <select class="field-select" id="f-tag">
            <option>General</option>
            <option>Termites</option>
            <option>Fire Ants</option>
            <option>Mosquitoes</option>
            <option>Biology</option>
            <option>Science</option>
            <option>Operations</option>
            <option>Ticks</option>
            <option>Rodents</option>
            <option>Wasps</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Excerpt <span style="color:var(--mid);font-size:9px;">(shown on listing page and in Google results — 1–2 sentences)</span></label>
        <textarea class="field-textarea" id="f-excerpt" placeholder="Brief description of the article. This appears in search results." style="min-height:64px;"></textarea>
      </div>

      <div class="blocks-area" id="blocks-area"></div>

      <div class="palette-section">
        <div class="palette-label">Add block</div>
        <div class="palette">
          <button class="palette-btn" onclick="addBlock('text')">&#43; Text</button>
          <button class="palette-btn" onclick="addBlock('heading')">&#43; Heading</button>
          <button class="palette-btn" onclick="addBlock('pullquote')">&#43; Pull quote</button>
          <button class="palette-btn" onclick="addBlock('image')">&#43; Image</button>
          <button class="palette-btn" onclick="addBlock('table')">&#43; Data table</button>
          <button class="palette-btn" onclick="addBlock('citation')">&#43; Citation</button>
          <button class="palette-btn" onclick="addBlock('pdf')">&#43; PDF download</button>
          <button class="palette-btn" onclick="addBlock('cta')">&#43; ZoneIQ CTA</button>
          <button class="palette-btn" onclick="addBlock('divider')">&#43; Divider</button>
        </div>
      </div>

      <div class="action-bar">
        <button class="btn-publish" onclick="publish(false)">Publish article &#8594;</button>
        <button class="btn-draft" onclick="publish(true)">Save draft</button>
        <button class="btn-preview" onclick="previewArticle()">Preview &#8599;</button>
        <span class="status-msg" id="status-msg"></span>
      </div>

    </div>
  </div>

  <!-- POSTS TAB -->
  <div id="tab-posts" class="tab-panel">
    <div class="posts-tab-layout">
      <div class="posts-tab-header">
        <div class="posts-tab-title">Published articles</div>
        <button class="btn-new" onclick="switchTab('editor')">New article</button>
      </div>
      <div id="posts-list"><div class="posts-loading">Loading...</div></div>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let PASSWORD = '';
let blocks = [];
let blockCounter = 0;

// ── AUTH ──────────────────────────────────────────────────────────────────────
document.getElementById('login-btn').onclick = async () => {
  const pw = document.getElementById('login-pw').value.trim();
  if (!pw) return;
  document.getElementById('login-btn').textContent = 'Checking...';
  const ok = await api('verify', {}, pw);
  if (ok && ok.ok) {
    PASSWORD = pw;
    sessionStorage.setItem('pp_pw', pw);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadDraft();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-btn').textContent = 'Sign in';
  }
};
document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-btn').click(); });
document.getElementById('logout-btn').onclick = () => {
  sessionStorage.removeItem('pp_pw');
  location.reload();
};

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${name}`));
  if (name === 'posts') loadPosts();
}

// Auto-login if session exists
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('pp_pw');
  if (saved) { document.getElementById('login-pw').value = saved; document.getElementById('login-btn').click(); }
});

// ── API ────────────────────────────────────────────────────────────────────────
async function api(action, data = {}, pw) {
  try {
    const r = await fetch('/api/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, password: pw || PASSWORD, ...data })
    });
    return r.json();
  } catch(e) { return { error: e.message }; }
}

// ── SLUG ────────────────────────────────────────────────────────────────────────
function slugify(t) {
  return t.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
}
function onTitleChange() {
  const slug = slugify(document.getElementById('f-title').value);
  document.getElementById('slug-display').textContent = `predictivepest.com/blog/${slug || ''}`;
  saveDraft();
}

// ── DRAFT ───────────────────────────────────────────────────────────────────────
function saveDraft() {
  try {
    localStorage.setItem('pp_draft', JSON.stringify({
      title: document.getElementById('f-title').value,
      tag:   document.getElementById('f-tag').value,
      excerpt: document.getElementById('f-excerpt').value,
      blocks
    }));
  } catch(e) {}
}
function loadDraft() {
  try {
    const d = localStorage.getItem('pp_draft');
    if (!d) return;
    const draft = JSON.parse(d);
    document.getElementById('f-title').value   = draft.title   || '';
    document.getElementById('f-tag').value     = draft.tag     || 'General';
    document.getElementById('f-excerpt').value = draft.excerpt || '';
    blocks = draft.blocks || [];
    onTitleChange();
    renderAllBlocks();
  } catch(e) {}
}
function clearEditor() {
  document.getElementById('f-title').value = '';
  document.getElementById('f-tag').value = 'General';
  document.getElementById('f-excerpt').value = '';
  document.getElementById('slug-display').textContent = 'predictivepest.com/blog/';
  blocks = [];
  renderAllBlocks();
  localStorage.removeItem('pp_draft');
}

// ── BLOCKS ─────────────────────────────────────────────────────────────────────
function addBlock(type, data = {}) {
  const id = ++blockCounter;
  const defaults = {
    text:      { content: '' },
    heading:   { content: '' },
    pullquote: { content: '' },
    image:     { url: '', alt: '', caption: '' },
    table:     { headers: ['Species', 'Threshold', 'Source'], rows: [['', '', '']] },
    citation:  { text: '', url: '', description: '' },
    pdf:       { title: '', url: '', description: '' },
    cta:       {},
    divider:   {}
  };
  blocks.push({ id, type, ...defaults[type], ...data });
  renderAllBlocks();
  saveDraft();
  // Scroll to new block
  setTimeout(() => document.getElementById(`block-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
}

function removeBlock(id) {
  blocks = blocks.filter(b => b.id !== id);
  renderAllBlocks();
  saveDraft();
}
function moveBlock(id, dir) {
  const i = blocks.findIndex(b => b.id === id);
  if (dir === -1 && i === 0) return;
  if (dir === 1 && i === blocks.length - 1) return;
  const tmp = blocks[i]; blocks[i] = blocks[i+dir]; blocks[i+dir] = tmp;
  renderAllBlocks();
  saveDraft();
}
function updateBlock(id, key, val) {
  const b = blocks.find(b => b.id === id);
  if (b) { b[key] = val; saveDraft(); }
}
function updateBlockDirect(id, obj) {
  const b = blocks.find(b => b.id === id);
  if (b) { Object.assign(b, obj); saveDraft(); }
}

function renderAllBlocks() {
  const area = document.getElementById('blocks-area');
  area.innerHTML = blocks.map(b => renderBlockCard(b)).join('');
  // Re-attach listeners for table rows etc.
  blocks.forEach(b => { if (b.type === 'image' && b.url) refreshImagePreview(b.id); });
}

function renderBlockCard(b) {
  const labels = { text:'Text', heading:'Heading', pullquote:'Pull quote', image:'Image', table:'Data table', citation:'Citation', pdf:'PDF download', cta:'ZoneIQ CTA', divider:'Divider' };
  const moveUp = `<button class="block-btn" onclick="moveBlock(${b.id},-1)" title="Move up">&#8593;</button>`;
  const moveDn = `<button class="block-btn" onclick="moveBlock(${b.id},1)" title="Move down">&#8595;</button>`;
  const delBtn = `<button class="block-btn del" onclick="removeBlock(${b.id})" title="Remove">&#215;</button>`;
  const head   = `<div class="block-head"><span class="block-type-label">${labels[b.type]||b.type}</span><div class="block-actions">${moveUp}${moveDn}${delBtn}</div></div>`;

  let body = '';
  switch(b.type) {
    case 'text':
      body = `<textarea class="block-textarea" placeholder="Write your paragraph(s) here. Double line break = new paragraph." oninput="updateBlock(${b.id},'content',this.value);saveDraft()">${esc(b.content)}</textarea>`;
      break;
    case 'heading':
      body = `<input type="text" class="block-input" placeholder="Section heading" value="${esc(b.content)}" oninput="updateBlock(${b.id},'content',this.value);saveDraft()"/>`;
      break;
    case 'pullquote':
      body = `<div class="pull-preview-block" style="margin-bottom:12px;">"${b.content||'Your quote will appear here'}"</div>
<textarea class="block-textarea" style="min-height:72px;" placeholder="Enter the pull quote text..." oninput="updateBlock(${b.id},'content',this.value);this.previousElementSibling.innerHTML='&ldquo;'+(this.value||'Your quote will appear here')+'&rdquo;';saveDraft()">${esc(b.content)}</textarea>`;
      break;
    case 'image':
      body = `<div id="img-preview-${b.id}">${b.url ? `<img src="${esc(b.url)}" class="img-preview" alt=""/>` : ''}</div>
<div class="img-upload-zone" onclick="document.getElementById('img-file-${b.id}').click()" id="img-zone-${b.id}">
  <input type="file" id="img-file-${b.id}" accept="image/*" style="display:none" onchange="handleImageUpload(${b.id},this)"/>
  <div class="img-upload-label">${b.url ? 'Click to replace image' : 'Click to <span>upload image</span>'}</div>
</div>
<div id="img-uploading-${b.id}" class="img-uploading" style="display:none">Uploading...</div>
<div class="block-row" style="margin-top:10px;">
  <div><span class="block-mini-label">Alt text</span><input type="text" class="block-input" placeholder="Describe the image" value="${esc(b.alt||'')}" oninput="updateBlock(${b.id},'alt',this.value)"/></div>
  <div><span class="block-mini-label">Caption (optional)</span><input type="text" class="block-input" placeholder="Caption shown below image" value="${esc(b.caption||'')}" oninput="updateBlock(${b.id},'caption',this.value)"/></div>
</div>`;
      break;
    case 'table':
      const hdrs = (b.headers||['','','']).map((h,i) => `<input type="text" class="tbl-header-input" placeholder="Column ${i+1}" value="${esc(h)}" oninput="updateTableHeader(${b.id},${i},this.value)"/>`).join('');
      const addHdr = `<button class="tbl-add-row" onclick="addTableColumn(${b.id})" style="flex-shrink:0">+ Col</button>`;
      const trows = (b.rows||[]).map((row,ri) => {
        const cells = row.map((c,ci) => `<input type="text" class="tbl-cell" placeholder="..." value="${esc(c)}" oninput="updateTableCell(${b.id},${ri},${ci},this.value)"/>`).join('');
        return `<div class="tbl-row">${cells}<button class="tbl-del-row" onclick="removeTableRow(${b.id},${ri})">&#215;</button></div>`;
      }).join('');
      body = `<div class="tbl-headers">${hdrs}${addHdr}</div>${trows}<button class="tbl-add-row" onclick="addTableRow(${b.id})">+ Add row</button>`;
      break;
    case 'citation':
      body = `<div class="block-row">
  <div><span class="block-mini-label">Link text</span><input type="text" class="block-input" placeholder="Purdue Extension — Termite Biology" value="${esc(b.text||'')}" oninput="updateBlock(${b.id},'text',this.value)"/></div>
  <div><span class="block-mini-label">URL</span><input type="url" class="block-input" placeholder="https://..." value="${esc(b.url||'')}" oninput="updateBlock(${b.id},'url',this.value)"/></div>
</div>
<div><span class="block-mini-label">Description (optional)</span><input type="text" class="block-input" placeholder="Brief note about this source" value="${esc(b.description||'')}" oninput="updateBlock(${b.id},'description',this.value)"/></div>`;
      break;
    case 'pdf':
      body = `<div class="block-row">
  <div><span class="block-mini-label">Document title</span><input type="text" class="block-input" placeholder="Degree-Day Models for Pest Management" value="${esc(b.title||'')}" oninput="updateBlock(${b.id},'title',this.value)"/></div>
  <div><span class="block-mini-label">PDF URL</span><input type="url" class="block-input" placeholder="https://..." value="${esc(b.url||'')}" oninput="updateBlock(${b.id},'url',this.value)"/></div>
</div>
<div><span class="block-mini-label">Description (optional)</span><input type="text" class="block-input" placeholder="What this document covers" value="${esc(b.description||'')}" oninput="updateBlock(${b.id},'description',this.value)"/></div>`;
      break;
    case 'cta':
      body = `<div class="cta-preview-block"><strong style="font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:.4px"><span style="color:#f8f7f5">ZONE</span><span style="color:#0ea5e9">IQ</span><span style="color:#f8f7f5">: Predictive Pest Management (PPM)</span></strong><br><span style="font-size:12px;font-weight:300;display:block;margin-top:4px">The intelligence layer the pest management industry has been missing.</span> <em style="opacity:.7;font-size:11px">— This block links to zoneiq.co</em></div>`;
      break;
    case 'divider':
      body = `<hr class="divider-preview"/>`;
      break;
  }
  return `<div class="block-card" id="block-${b.id}">${head}<div class="block-body">${body}</div></div>`;
}

// ── TABLE HELPERS ──────────────────────────────────────────────────────────────
function updateTableHeader(id, ci, val) {
  const b = blocks.find(b=>b.id===id); if(!b) return;
  if (!b.headers) b.headers = [];
  b.headers[ci] = val; saveDraft();
}
function updateTableCell(id, ri, ci, val) {
  const b = blocks.find(b=>b.id===id); if(!b) return;
  if (!b.rows[ri]) b.rows[ri]=[];
  b.rows[ri][ci] = val; saveDraft();
}
function addTableRow(id) {
  const b = blocks.find(b=>b.id===id); if(!b) return;
  b.rows.push(new Array((b.headers||[]).length).fill(''));
  renderAllBlocks(); saveDraft();
}
function removeTableRow(id, ri) {
  const b = blocks.find(b=>b.id===id); if(!b) return;
  b.rows.splice(ri,1);
  renderAllBlocks(); saveDraft();
}
function addTableColumn(id) {
  const b = blocks.find(b=>b.id===id); if(!b) return;
  b.headers.push('');
  b.rows.forEach(r => r.push(''));
  renderAllBlocks(); saveDraft();
}

// ── IMAGE UPLOAD ───────────────────────────────────────────────────────────────
async function handleImageUpload(id, input) {
  const file = input.files[0]; if(!file) return;
  const uploading = document.getElementById(`img-uploading-${id}`);
  uploading.style.display = 'block';
  const reader = new FileReader();
  reader.onload = async (e) => {
    const result = await api('upload-image', { imageData: e.target.result, fileName: file.name });
    uploading.style.display = 'none';
    if (result.url) {
      updateBlock(id, 'url', result.url);
      document.getElementById(`img-preview-${id}`).innerHTML = `<img src="${result.url}" class="img-preview" alt=""/>`;
      document.querySelector(`#img-zone-${id} .img-upload-label`).innerHTML = 'Click to replace image';
    } else {
      uploading.style.display = 'block';
      uploading.textContent = 'Upload failed. Try again.';
      uploading.style.color = 'var(--red)';
    }
  };
  reader.readAsDataURL(file);
}
function refreshImagePreview(id) {}

// ── PUBLISH ────────────────────────────────────────────────────────────────────
async function publish(isDraft) {
  const title   = document.getElementById('f-title').value.trim();
  const tag     = document.getElementById('f-tag').value;
  const excerpt = document.getElementById('f-excerpt').value.trim();
  const slug    = slugify(title);
  const msg     = document.getElementById('status-msg');

  if (!title) { msg.className='status-msg status-err'; msg.textContent='Please add a title.'; return; }
  if (!slug)  { msg.className='status-msg status-err'; msg.textContent='Title must contain letters or numbers.'; return; }
  if (!isDraft && !excerpt) { msg.className='status-msg status-err'; msg.textContent='Please add an excerpt before publishing.'; return; }

  const btn = isDraft ? document.querySelector('.btn-draft') : document.querySelector('.btn-publish');
  const orig = btn.textContent;
  btn.textContent = isDraft ? 'Saving...' : 'Publishing...';
  btn.disabled = true;
  msg.textContent = '';

  const result = await api('publish', { title, slug, tag, excerpt, blocks, isDraft });

  btn.textContent = orig;
  btn.disabled = false;

  if (result.success) {
    msg.className = 'status-msg status-ok';
    msg.textContent = isDraft ? 'Draft saved.' : `Published. Live in ~60 seconds.`;
    if (!isDraft) localStorage.removeItem('pp_draft');
  } else {
    msg.className = 'status-msg status-err';
    msg.textContent = result.error || 'Something went wrong.';
  }
}

// ── PREVIEW ────────────────────────────────────────────────────────────────────
function previewArticle() {
  const title = document.getElementById('f-title').value.trim() || 'Preview';
  const excerpt = document.getElementById('f-excerpt').value.trim();
  const tag = document.getElementById('f-tag').value;
  const date = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const content = blocks.map(b => previewBlock(b)).join('\n\n');
  const html = previewHTML(title, tag, date, excerpt, content);
  const blob = new Blob([html], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

function previewBlock(b) {
  switch(b.type) {
    case 'text': return (b.content||'').split(/\n\n+/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('\n');
    case 'heading': return `<h3 class="art-h3">${esc(b.content)}</h3>`;
    case 'pullquote': return `<blockquote class="art-pull">\u201c${esc(b.content)}\u201d</blockquote>`;
    case 'image': return b.url ? `<figure class="art-figure"><img src="${esc(b.url)}" class="art-img" alt="${esc(b.alt||'')}"/>${b.caption?`<figcaption class="art-caption">${esc(b.caption)}</figcaption>`:''}</figure>` : '';
    case 'table': { const hds=(b.headers||[]).map(h=>`<th>${esc(h)}</th>`).join(''); const rws=(b.rows||[]).map(r=>`<tr>${(r||[]).map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join(''); return `<div class="art-table-wrap"><table class="art-table"><thead><tr>${hds}</tr></thead><tbody>${rws}</tbody></table></div>`; }
    case 'citation': return `<div class="art-citation"><span class="cit-label">Source</span><a href="${esc(b.url)}" class="cit-link">${esc(b.text)}</a>${b.description?`<span class="cit-desc"> — ${esc(b.description)}</span>`:''}</div>`;
    case 'pdf': return `<div class="art-pdf"><span class="pdf-icon">PDF</span><div class="pdf-body"><div class="pdf-title">${esc(b.title)}</div>${b.description?`<div class="pdf-desc">${esc(b.description)}</div>`:''}</div><a href="${esc(b.url)}" class="pdf-dl">Download &rarr;</a></div>`;
    case 'cta': return `<div class="art-cta"><div class="cta-h"><span class="cta-zone">ZONE</span><span class="cta-iq">IQ</span><span class="cta-rest">: Predictive Pest Management (PPM)</span></div><p class="cta-sub">The intelligence layer the pest management industry has been missing.</p><a href="https://zoneiq.co" class="cta-link">Explore ZoneIQ at zoneiq.co &rarr;</a></div>`;
    case 'divider': return `<hr class="art-divider"/>`;
    default: return '';
  }
}

function previewHTML(title, tag, date, excerpt, content) {
  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>${esc(title)} — Preview</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"><style>:root{--white:#fff;--off:#f8f7f5;--paper:#f2f0ec;--rule:#dedad3;--mid:#b0aba1;--muted:#7a7670;--body:#2e2c28;--ink:#141210;--moss:#2d4a35;--sage:#4e7a58;--sage-lt:#a8c4ac;--amber:#b5622a;}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{background:var(--white);color:var(--body);font-family:'IBM Plex Sans',sans-serif;font-weight:300;line-height:1.7;padding:80px 40px}.preview-banner{background:var(--amber);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;padding:8px 16px;position:fixed;top:0;left:0;right:0;text-align:center;z-index:999}.art-wrap{max-width:720px;margin:0 auto;padding-top:20px}.art-back{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em;display:inline-block;margin-bottom:32px}.art-meta{display:flex;gap:20px;margin-bottom:20px}.art-date,.art-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em}.art-date{color:var(--mid)}.art-tag{color:var(--sage)}h1.art-title{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.12;color:var(--ink);margin-bottom:32px}.art-rule{border:none;border-top:1px solid var(--rule);margin:32px 0}.art-body p{font-size:16px;line-height:1.8;color:var(--body);margin-bottom:22px;font-weight:300}.art-h3{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--ink);margin:40px 0 14px}.art-pull{border-left:2px solid var(--sage);padding-left:24px;margin:36px 0;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;font-style:italic;color:var(--moss);line-height:1.45}.art-figure{margin:32px 0}.art-img{width:100%;height:auto;border-radius:4px;display:block}.art-caption{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);margin-top:10px}.art-table-wrap{margin:28px 0;overflow-x:auto;border:1px solid var(--rule);border-radius:4px}.art-table{width:100%;border-collapse:collapse;font-size:13px}.art-table th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--rule);text-align:left;font-weight:400;letter-spacing:.06em;background:var(--off)}.art-table td{padding:10px 14px;border-bottom:1px solid var(--rule);color:var(--body)}.art-table tr:last-child td{border-bottom:none}.art-citation{display:flex;align-items:baseline;gap:10px;padding:12px 16px;background:var(--off);border:1px solid var(--rule);border-radius:4px;margin:24px 0;flex-wrap:wrap}.cit-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mid);letter-spacing:.08em;text-transform:uppercase}.cit-link{font-size:13px;color:var(--sage);text-decoration:none;border-bottom:1px solid var(--sage-lt)}.cit-desc{font-size:12px;color:var(--muted);font-style:italic}.art-pdf{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--off);border:1px solid var(--rule);border-radius:4px;margin:24px 0}.pdf-icon{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);border:1px solid var(--amber);padding:4px 7px;border-radius:3px}.pdf-body{flex:1}.pdf-title{font-size:14px;color:var(--ink);font-weight:400;margin-bottom:2px}.pdf-desc{font-size:12px;color:var(--muted)}.pdf-dl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sage);text-decoration:none}.art-cta{background:var(--moss);padding:20px 28px;border-radius:4px;margin:44px 0}.cta-h{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;letter-spacing:.5px;color:var(--off);margin-bottom:6px}.cta-zone{color:var(--off)}.cta-iq{color:#0ea5e9}.cta-rest{color:var(--off)}.cta-sub{font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--sage-lt);font-weight:300;margin-bottom:14px;line-height:1.5}.cta-link{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sage-lt);text-decoration:none;letter-spacing:.06em;border-bottom:1px solid var(--sage);padding-bottom:2px;display:inline-block}.art-divider{border:none;border-top:1px solid var(--rule);margin:36px 0}</style></head><body><div class="preview-banner">PREVIEW — not yet published</div><div class="art-wrap"><div class="art-back">&larr; Field Notes</div><div class="art-meta"><span class="art-date">${date.toUpperCase()}</span><span class="art-tag">${esc(tag)}</span></div><h1 class="art-title">${esc(title)}</h1><hr class="art-rule"/><div class="art-body">${content}</div></div></body></html>`;
}

// ── POSTS LIST ─────────────────────────────────────────────────────────────────
async function loadPosts() {
  const container = document.getElementById('posts-list');
  container.innerHTML = '<div class="posts-loading">Loading...</div>';
  const posts = await api('get-posts');
  if (!Array.isArray(posts) || !posts.length) {
    container.innerHTML = '<div class="posts-empty">No articles published yet.</div>';
    return;
  }
  container.innerHTML = posts.map(p => `
<div class="post-item">
  <div>
    <div class="post-item-title">${esc(p.title)}</div>
    <div class="post-item-meta">${p.date} &nbsp;·&nbsp; ${p.tag}</div>
  </div>
  <div class="post-item-actions">
    <a href="/blog/${p.slug}" target="_blank" class="btn-view">View &nearr;</a>
    <button class="btn-del-post" onclick="deletePost('${p.slug}','${esc(p.title)}')">Delete</button>
  </div>
</div>`).join('');
}

async function deletePost(slug, title) {
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  const result = await api('delete', { slug });
  if (result.success) loadPosts();
  else alert('Delete failed: ' + (result.error || 'Unknown error'));
}

// ── UTILS ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial render
renderAllBlocks();
</script>
